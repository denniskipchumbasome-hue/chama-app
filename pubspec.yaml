name: chama_app
description: Chama management app for self-help groups in Kenya

environment:
  sdk: '>=3.7.0 <4.0.0'  # Updated to match Flutter 3.32.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  pdf: ^3.11.1
  share_plus: ^10.1.3
  intl: ^0.20.2
  excel: ^4.0.6
  local_auth: ^2.3.0
  clipboard: ^0.1.3
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.1.3

dependency_overrides:
  material_color_utilities: ^0.11.1  # Fixes transitive dependency conflict

flutter:
  generate: true
  uses-material-design: true
